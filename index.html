 <!DOCTYPE html>
 <html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Calculator By Grace</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

      <div class="calculator">
<div id="perviousOutput"><p id="previoutEqOutput"></p></div>
<div id="typingOutput"><p id="equationOutput"></p></div>

        <div class="buttons">
<button id="deleteBtn" class="darkMode buttonsValuesA">AC</button>
<button id="mixBtn" class="darkMode buttonsValuesA">+/-</button>
<button id="percentBtn" class="buttonsValues darkMode" >%</button>
<button id="divisionBtn" class="signs buttonsValues lightMode">/</button>
<button id="sevenBtn" class="buttonsValues darkMode">7</button>
<button id="eightBtn" class="buttonsValues darkMode">8</button>
<button id="nineBtn" class="buttonsValues darkMode">9</button>
<button id="timesBtn" class="signs buttonsValues lightMode">*</button>
<button id="fourBtn" class="buttonsValues darkMode">4</button>
<button id="fiveBtn" class="buttonsValues darkMode">5</button>
<button id="sixBtn" class="buttonsValues darkMode">6</button>
<button id="minusBtn" class="signs buttonsValues lightMode">-</button>
<button id="oneBtn" class="buttonsValues darkMode">1</button>
<button id="twoBtn" class="buttonsValues darkMode">2</button>
<button id="threeBtn" class="buttonsValues darkMode">3</button>
<button id="plusBtn" class="signs buttonsValues lightMode">+</button>
<button id="modeBtn" class="darkMode">B-Mode</button>
<button id="zeroBtn" class="buttonsValues darkMode">0</button>
<button id="dotBtn" class="buttonsValues darkMode">.</button>
<button id="equalBtn" class="signs lightMode">=</button>
</div>
      </div>


     <script src="script.js"></script>
    </body>
 </html>
